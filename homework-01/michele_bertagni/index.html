<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wonder Boy: Monster Quest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      border: 2px solid #222;
      image-rendering: pixelated;
    }
    #hint {
      color: #444;
      font-size: 11px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="500"></canvas>
  <div id="hint">Arrows/WASD: Move &amp; Jump &nbsp;|&nbsp; Z/X: Attack &nbsp;|&nbsp; C: Spell &nbsp;|&nbsp; E: Shop</div>
  <script src="game.js"></script>
</body>
</html>
